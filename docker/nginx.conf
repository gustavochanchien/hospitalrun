server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip common text assets — Workbox precache is already hashed
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 512;

  # SPA fallback — TanStack Router owns client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Runtime backend config — written by the entrypoint when
  # SUPABASE_URL / SUPABASE_ANON_KEY env vars are set. Never cache.
  location = /config.json {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # Service worker must be allowed to control the full origin
  location = /sw.js {
    add_header Service-Worker-Allowed "/" always;
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # ── Security headers ────────────────────────────────────────────────────────
  # Mirror of vercel.json / public/_headers. CSP connect-src MUST include
  # wss://*.supabase.co or Supabase Realtime sync will silently fail.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}
